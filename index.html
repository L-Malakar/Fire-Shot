<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON SURVIVORS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============ RESET & BASE ============ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #06060c; font-family: 'Share Tech Mono', monospace; color: #e0e0e0; cursor: crosshair; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .hidden { display: none !important; }

        /* ============ HUD ============ */
        #hud { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; }
        #hudTop { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 28px; }
        #waveNum { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: #00ff88; letter-spacing: 3px; text-shadow: 0 0 12px rgba(0,255,136,0.5); }
        #scoreDisplay { text-align: right; }
        #score { font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 900; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.3); }
        #combo { display: inline-block; margin-left: 10px; font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: #ffaa00; text-shadow: 0 0 10px rgba(255,170,0,0.6); animation: comboPulse 0.3s ease; }
        @keyframes comboPulse { 0% { transform: scale(1.4); } 100% { transform: scale(1); } }
        #hudBottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 28px; display: flex; align-items: flex-end; justify-content: space-between; }
        #hpBarOuter { width: 260px; height: 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(0,255,136,0.2); border-radius: 2px; overflow: hidden; position: relative; }
        #hpFill { height: 100%; background: linear-gradient(90deg, #00cc66, #00ff88); transition: width 0.25s ease; box-shadow: 0 0 12px rgba(0,255,136,0.4); border-radius: 1px; }
        #hpText { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 11px; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); letter-spacing: 1px; }
        #upgradeDots { display: flex; gap: 6px; }
        .upgrade-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); }

        /* ============ BOSS BAR ============ */
        #bossBarWrap { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); width: 400px; max-width: 80vw; z-index: 11; text-align: center; }
        #bossName { font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700; color: #ff2244; letter-spacing: 4px; margin-bottom: 6px; text-shadow: 0 0 10px rgba(255,34,68,0.5); }
        #bossBarOuter { width: 100%; height: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,34,68,0.3); border-radius: 2px; overflow: hidden; }
        #bossHpFill { height: 100%; background: linear-gradient(90deg, #cc0022, #ff2244); transition: width 0.2s ease; box-shadow: 0 0 10px rgba(255,34,68,0.5); }

        /* ============ MENU SCREEN ============ */
        #menuScreen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, rgba(0,255,136,0.03) 0%, transparent 60%), #06060c; }
        #menuScreen h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(36px, 7vw, 72px); font-weight: 900; color: #00ff88; text-shadow: 0 0 40px rgba(0,255,136,0.4), 0 0 80px rgba(0,255,136,0.15); letter-spacing: 6px; margin-bottom: 12px; }
        #menuScreen .subtitle { font-size: 14px; color: rgba(255,255,255,0.35); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 48px; }
        #startBtn { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: #06060c; background: #00ff88; border: none; padding: 16px 52px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 0 30px rgba(0,255,136,0.3); pointer-events: auto; }
        #startBtn:hover { background: #33ffaa; box-shadow: 0 0 50px rgba(0,255,136,0.5); transform: translateY(-2px); }
        #startBtn:active { transform: translateY(0); }
        #controls { margin-top: 40px; display: flex; gap: 32px; font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 2px; }
        #controls span { display: flex; align-items: center; gap: 8px; }
        #controls i { color: rgba(0,255,136,0.4); font-size: 14px; }

        /* ============ SHOP SCREEN ============ */
        #shopScreen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(6,6,12,0.92); backdrop-filter: blur(8px); }
        #shopScreen h2 { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 700; color: #ffaa00; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255,170,0,0.4); }
        #upgradeCards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
        .upgrade-card { width: 200px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 28px 20px; text-align: center; cursor: pointer; transition: all 0.25s ease; position: relative; overflow: hidden; }
        .upgrade-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--uc-color); box-shadow: 0 0 15px var(--uc-color); opacity: 0.7; }
        .upgrade-card:hover { background: rgba(255,255,255,0.06); border-color: var(--uc-color); transform: translateY(-6px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
        .upgrade-card i { font-size: 32px; margin-bottom: 16px; display: block; }
        .upgrade-card .uc-name { font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 8px; letter-spacing: 1px; }
        .upgrade-card .uc-desc { font-size: 11px; color: rgba(255,255,255,0.4); line-height: 1.6; }
        .upgrade-card .uc-level { margin-top: 12px; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

        /* ============ GAME OVER SCREEN ============ */
        #gameOverScreen { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(6,6,12,0.94); backdrop-filter: blur(10px); }
        #gameOverScreen h2 { font-family: 'Orbitron', sans-serif; font-size: clamp(28px, 5vw, 48px); font-weight: 900; color: #ff2244; letter-spacing: 6px; margin-bottom: 36px; text-shadow: 0 0 30px rgba(255,34,68,0.4); }
        #finalStats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 40px; margin-bottom: 40px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; color: #fff; }
        #retryBtn { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 700; color: #06060c; background: #ff2244; border: none; padding: 14px 44px; letter-spacing: 3px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 0 25px rgba(255,34,68,0.3); pointer-events: auto; }
        #retryBtn:hover { background: #ff4466; box-shadow: 0 0 45px rgba(255,34,68,0.5); transform: translateY(-2px); }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 680px) {
            .upgrade-card { width: 160px; padding: 20px 14px; }
            .upgrade-card i { font-size: 24px; }
            #hudTop { padding: 12px 16px; }
            #hudBottom { padding: 12px 16px; }
            #hpBarOuter { width: 180px; height: 14px; }
            #score { font-size: 20px; }
            #controls { flex-direction: column; gap: 12px; align-items: center; }
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div id="hudTop">
            <div id="waveNum">WAVE 1</div>
            <div id="scoreDisplay">
                <span id="score">0</span>
                <span id="combo" class="hidden"></span>
            </div>
        </div>
        <div id="hudBottom">
            <div id="hpBarOuter">
                <div id="hpFill" style="width:100%"></div>
                <span id="hpText">100 / 100</span>
            </div>
            <div id="upgradeDots"></div>
        </div>
    </div>

    <!-- Boss Health Bar -->
    <div id="bossBarWrap" class="hidden">
        <div id="bossName">OVERLORD</div>
        <div id="bossBarOuter"><div id="bossHpFill" style="width:100%"></div></div>
    </div>

    <!-- Menu Screen -->
    <div id="menuScreen">
        <h1>NEON SURVIVORS</h1>
        <p class="subtitle">Survive the neon onslaught</p>
        <button id="startBtn">START GAME</button>
        <div id="controls">
            <span><i class="fas fa-arrows-up-down-left-right"></i> WASD Move</span>
            <span><i class="fas fa-computer-mouse"></i> Mouse Aim</span>
            <span><i class="fas fa-crosshairs"></i> Click Shoot</span>
        </div>
    </div>

    <!-- Shop Screen -->
    <div id="shopScreen" class="hidden">
        <h2>CHOOSE UPGRADE</h2>
        <div id="upgradeCards"></div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="hidden">
        <h2>GAME OVER</h2>
        <div id="finalStats">
            <div class="stat-item"><div class="stat-label">Score</div><div class="stat-value" id="fScore">0</div></div>
            <div class="stat-item"><div class="stat-label">Waves</div><div class="stat-value" id="fWaves">0</div></div>
            <div class="stat-item"><div class="stat-label">Kills</div><div class="stat-value" id="fKills">0</div></div>
            <div class="stat-item"><div class="stat-label">Best Combo</div><div class="stat-value" id="fCombo">0</div></div>
        </div>
        <button id="retryBtn">TRY AGAIN</button>
    </div>

    <script>
    /* ================================================================
       NEON SURVIVORS - Complete Game Engine
       ================================================================ */

    // ==================== CANVAS SETUP ====================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ==================== CONFIGURATION ====================
    const CFG = {
        ARENA_W: 3200,
        ARENA_H: 3200,
        GRID_SIZE: 80,
        PLAYER_RADIUS: 14,
        PLAYER_SPEED: 3.8,
        PLAYER_MAX_HP: 100,
        PLAYER_DMG: 20,
        FIRE_RATE: 9,
        BULLET_SPEED: 11,
        BULLET_RADIUS: 4,
        BULLET_LIFE: 70,
        PICKUP_RADIUS: 50,
        INVINCE_TIME: 45,
        COMBO_TIMEOUT: 120,
        MAX_PARTICLES: 400,
        ENEMY_COLORS: {
            drone: '#ff0044',
            brute: '#ff6600',
            splitter: '#ff00aa',
            shooter: '#ffaa00',
            mini: '#ff4488',
            boss: '#ff1133'
        }
    };

    // ==================== UPGRADE POOL ====================
    const UPGRADE_POOL = [
        { id:'damage', name:'Plasma Core', desc:'+25% bullet damage', icon:'fa-bolt', color:'#ff4444', apply(p){ p.damage *= 1.25; }},
        { id:'fireRate', name:'Rapid Fire', desc:'+20% fire rate', icon:'fa-gauge-high', color:'#ffaa00', apply(p){ p.fireRate = Math.max(2, p.fireRate * 0.8); }},
        { id:'speed', name:'Thrusters', desc:'+12% move speed', icon:'fa-wind', color:'#00bbff', apply(p){ p.speed *= 1.12; }},
        { id:'maxHp', name:'Hull Plating', desc:'+30 max HP & full heal', icon:'fa-shield-heart', color:'#00ff88', apply(p){ p.maxHp += 30; p.hp = p.maxHp; }},
        { id:'pierce', name:'Piercing Rounds', desc:'Bullets pierce +1 enemy', icon:'fa-angles-right', color:'#aa44ff', apply(p){ p.pierce += 1; }},
        { id:'multiShot', name:'Spread Shot', desc:'+1 bullet per shot', icon:'fa-burst', color:'#ff8800', apply(p){ p.multiShot += 1; }},
        { id:'bulletSize', name:'Heavy Rounds', desc:'+35% bullet size', icon:'fa-circle', color:'#ff66aa', apply(p){ p.bulletRadius *= 1.35; }},
        { id:'lifeSteal', name:'Vampiric Drain', desc:'Heal 4% of damage dealt', icon:'fa-droplet', color:'#ff0066', apply(p){ p.lifeSteal += 0.04; }},
        { id:'magnet', name:'Mag Field', desc:'+60% pickup radius', icon:'fa-magnet', color:'#00ffcc', apply(p){ p.pickupRadius *= 1.6; }},
        { id:'armor', name:'Nano Armor', desc:'-12% damage taken', icon:'fa-vest', color:'#8888ff', apply(p){ p.armor *= 0.88; }},
    ];

    // ==================== GAME STATE ====================
    let state = 'menu';
    let camera = { x: 0, y: 0 };
    let keys = {};
    let mouse = { x: W/2, y: H/2, down: false };
    let player = {};
    let bullets = [];
    let eBullets = [];
    let enemies = [];
    let particles = [];
    let powerUps = [];
    let dmgNums = [];
    let bgStars = [];

    let wave = 0;
    let spawnQueue = [];
    let spawnTimer = 0;
    let waveActive = false;
    let waveCompleteTimer = 0;

    let score = 0;
    let combo = 0;
    let comboTimer = 0;
    let maxCombo = 0;
    let totalKills = 0;

    let screenShake = 0;
    let flashAlpha = 0;
    let flashColor = '#ff0000';
    let invTimer = 0;

    let announce = { text: '', timer: 0, sub: '' };

    let upgradeLevels = {};
    let fireTimer = 0;
    let bossRef = null;

    // ==================== UTILITY ====================
    function rand(a, b) { return a + Math.random() * (b - a); }
    function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function angle(a, b) { return Math.atan2(b.y - a.y, b.x - a.x); }

    // ==================== BACKGROUND STARS ====================
    function initStars() {
        bgStars = [];
        for (let i = 0; i < 120; i++) {
            bgStars.push({
                x: rand(-CFG.ARENA_W/2, CFG.ARENA_W/2),
                y: rand(-CFG.ARENA_H/2, CFG.ARENA_H/2),
                r: rand(0.5, 2),
                a: rand(0.1, 0.35),
                pulse: rand(0.005, 0.02)
            });
        }
    }

    // ==================== PLAYER INIT ====================
    function initPlayer() {
        player = {
            x: 0, y: 0, vx: 0, vy: 0,
            radius: CFG.PLAYER_RADIUS,
            speed: CFG.PLAYER_SPEED,
            hp: CFG.PLAYER_MAX_HP,
            maxHp: CFG.PLAYER_MAX_HP,
            damage: CFG.PLAYER_DMG,
            fireRate: CFG.FIRE_RATE,
            pierce: 0,
            multiShot: 1,
            bulletRadius: CFG.BULLET_RADIUS,
            lifeSteal: 0,
            pickupRadius: CFG.PICKUP_RADIUS,
            armor: 1,
            angle: 0
        };
    }

    // ==================== PARTICLE SYSTEM ====================
    function spawnParticle(x, y, color, opts = {}) {
        if (particles.length >= CFG.MAX_PARTICLES) particles.shift();
        const a = opts.angle !== undefined ? opts.angle : rand(0, Math.PI * 2);
        const sp = opts.speed !== undefined ? opts.speed : rand(1, 5);
        particles.push({
            x, y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp,
            radius: opts.radius || rand(1.5, 4),
            color,
            alpha: 1,
            decay: opts.decay || rand(0.015, 0.04),
            friction: opts.friction || 0.97
        });
    }

    function spawnExplosion(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
            spawnParticle(x, y, color, { speed: rand(2, 7), radius: rand(2, 5), decay: rand(0.02, 0.05) });
        }
    }

    function spawnDmgNum(x, y, text, color = '#fff') {
        dmgNums.push({ x, y, text, color, alpha: 1, vy: -2, life: 50 });
    }

    // ==================== BULLET SYSTEM ====================
    function fireBullets() {
        const a = player.angle;
        const spread = 0.15;
        const count = player.multiShot;
        for (let i = 0; i < count; i++) {
            const offset = count === 1 ? 0 : (i - (count - 1) / 2) * spread;
            const ba = a + offset;
            bullets.push({
                x: player.x + Math.cos(ba) * (player.radius + 6),
                y: player.y + Math.sin(ba) * (player.radius + 6),
                vx: Math.cos(ba) * CFG.BULLET_SPEED,
                vy: Math.sin(ba) * CFG.BULLET_SPEED,
                radius: player.bulletRadius,
                damage: player.damage,
                pierce: player.pierce,
                life: CFG.BULLET_LIFE,
                trail: []
            });
        }
    }

    function spawnEnemyBullet(ex, ey, tx, ty, speed = 4) {
        const a = Math.atan2(ty - ey, tx - ex);
        eBullets.push({
            x: ex, y: ey,
            vx: Math.cos(a) * speed,
            vy: Math.sin(a) * speed,
            radius: 5,
            damage: 12,
            life: 120
        });
    }

    function spawnRingBullets(ex, ey, count = 12, speed = 3) {
        for (let i = 0; i < count; i++) {
            const a = (Math.PI * 2 / count) * i;
            eBullets.push({
                x: ex, y: ey,
                vx: Math.cos(a) * speed,
                vy: Math.sin(a) * speed,
                radius: 5,
                damage: 15,
                life: 100
            });
        }
    }

    // ==================== ENEMY SYSTEM ====================
    const ENEMY_DEFS = {
        drone:    { radius: 11, speed: 2.4, hp: 30, dmg: 10, score: 10, shape: 'tri' },
        brute:    { radius: 22, speed: 1.1, hp: 130, dmg: 25, score: 30, shape: 'hex' },
        splitter: { radius: 16, speed: 1.7, hp: 55, dmg: 15, score: 20, shape: 'diamond', splits: true },
        shooter:  { radius: 13, speed: 1.4, hp: 40, dmg: 8, score: 18, shape: 'penta', shoots: true, shootInterval: 110, prefDist: 250 },
        mini:     { radius: 8, speed: 3.0, hp: 15, dmg: 6, score: 5, shape: 'tri' },
        boss:     { radius: 38, speed: 0.9, hp: 600, dmg: 30, score: 250, shape: 'oct', shoots: true, shootInterval: 80, rings: true, ringInterval: 200 }
    };

    function createEnemy(type, x, y) {
        const d = ENEMY_DEFS[type];
        const hpScale = 1 + (wave - 1) * 0.12;
        return {
            type, x, y, vx: 0, vy: 0,
            radius: d.radius,
            speed: d.speed + (wave - 1) * 0.03,
            hp: Math.floor(d.hp * hpScale),
            maxHp: Math.floor(d.hp * hpScale),
            dmg: d.dmg + Math.floor(wave * 0.5),
            score: d.score,
            shape: d.shape,
            color: CFG.ENEMY_COLORS[type],
            angle: 0,
            flashTimer: 0,
            shootTimer: d.shootInterval || 999,
            ringTimer: d.ringInterval || 999,
            prefDist: d.prefDist || 0,
            splits: d.splits || false,
            shoots: d.shootes || false,
            rings: d.rings || false,
            isBoss: type === 'boss'
        };
    }

    function spawnEnemyAtEdge(type) {
        const side = randInt(0, 3);
        const margin = 60;
        const hw = CFG.ARENA_W / 2 - margin;
        const hh = CFG.ARENA_H / 2 - margin;
        let x, y;
        if (side === 0) { x = rand(-hw, hw); y = -hh; }
        else if (side === 1) { x = hw; y = rand(-hh, hh); }
        else if (side === 2) { x = rand(-hw, hw); y = hh; }
        else { x = -hw; y = rand(-hh, hh); }
        return createEnemy(type, x, y);
    }

    // ==================== POWER-UP SYSTEM ====================
    const PU_TYPES = [
        { id: 'health', name: 'Repair Kit', color: '#00ff88', icon: 'plus', effect(p) { p.hp = Math.min(p.hp + 30, p.maxHp); } },
        { id: 'speed', name: 'Speed Boost', color: '#00bbff', icon: 'bolt', effect(p) { /* temporary could be added */ p.hp = Math.min(p.hp + 15, p.maxHp); } },
        { id: 'damage', name: 'Damage Boost', color: '#ff4444', icon: 'arrow', effect(p) { p.hp = Math.min(p.hp + 15, p.maxHp); } },
    ];

    function spawnPowerUp(x, y) {
        if (Math.random() > 0.28) return; // 28% drop chance
        const type = PU_TYPES[randInt(0, PU_TYPES.length - 1)];
        powerUps.push({
            x, y, type,
            radius: 12,
            life: 480,
            pulse: 0
        });
    }

    // ==================== WAVE SYSTEM ====================
    function getWaveComp(w) {
        if (w % 5 === 0) {
            return [{ type: 'boss', count: 1 }, { type: 'drone', count: Math.floor(w / 2) }];
        }
        const comp = [];
        const base = 3 + w * 2;
        comp.push({ type: 'drone', count: Math.ceil(base * 0.45) });
        if (w >= 3) comp.push({ type: 'brute', count: Math.ceil(base * 0.2) });
        if (w >= 4) comp.push({ type: 'splitter', count: Math.ceil(base * 0.15) });
        if (w >= 6) comp.push({ type: 'shooter', count: Math.ceil(base * 0.15) });
        return comp;
    }

    function startWave() {
        wave++;
        spawnQueue = [];
        const comp = getWaveComp(wave);
        comp.forEach(g => {
            for (let i = 0; i < g.count; i++) spawnQueue.push(g.type);
        });
        // Shuffle
        for (let i = spawnQueue.length - 1; i > 0; i--) {
            const j = randInt(0, i);
            [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
        }
        spawnTimer = 0;
        waveActive = true;
        bossRef = null;
        announce = { text: wave % 5 === 0 ? 'BOSS INCOMING' : 'WAVE ' + wave, timer: 90, sub: wave % 5 === 0 ? 'Prepare yourself' : spawnQueue.length + ' enemies' };
        document.getElementById('waveNum').textContent = 'WAVE ' + wave;
    }

    // ==================== COLLISION ====================
    function circleCollide(a, b) {
        return dist(a, b) < a.radius + b.radius;
    }

    // ==================== UPDATE FUNCTIONS ====================
    function updatePlayer() {
        // Movement
        let ax = 0, ay = 0;
        if (keys['w'] || keys['arrowup']) ay -= 1;
        if (keys['s'] || keys['arrowdown']) ay += 1;
        if (keys['a'] || keys['arrowleft']) ax -= 1;
        if (keys['d'] || keys['arrowright']) ax += 1;
        const len = Math.hypot(ax, ay);
        if (len > 0) { ax /= len; ay /= len; }

        player.vx = lerp(player.vx, ax * player.speed, 0.18);
        player.vy = lerp(player.vy, ay * player.speed, 0.18);
        player.x += player.vx;
        player.y += player.vy;

        // Clamp to arena
        const hw = CFG.ARENA_W / 2 - player.radius;
        const hh = CFG.ARENA_H / 2 - player.radius;
        player.x = clamp(player.x, -hw, hw);
        player.y = clamp(player.y, -hh, hh);

        // Aim angle
        const worldMouseX = mouse.x - W/2 + camera.x;
        const worldMouseY = mouse.y - H/2 + camera.y;
        player.angle = Math.atan2(worldMouseY - player.y, worldMouseX - player.x);

        // Fire
        if (mouse.down) {
            fireTimer--;
            if (fireTimer <= 0) {
                fireBullets();
                fireTimer = player.fireRate;
            }
        } else {
            fireTimer = Math.min(fireTimer, 0);
        }

        // Invincibility
        if (invTimer > 0) invTimer--;

        // Movement particles
        if (len > 0 && Math.random() < 0.3) {
            spawnParticle(
                player.x - Math.cos(player.angle) * player.radius,
                player.y - Math.sin(player.angle) * player.radius,
                '#00ff88', { speed: rand(0.5, 1.5), radius: rand(1, 2.5), decay: 0.04 }
            );
        }
    }

    function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.trail.push({ x: b.x, y: b.y });
            if (b.trail.length > 6) b.trail.shift();
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            // Out of arena or expired
            if (b.life <= 0 || Math.abs(b.x) > CFG.ARENA_W/2 + 20 || Math.abs(b.y) > CFG.ARENA_H/2 + 20) {
                bullets.splice(i, 1);
            }
        }
        for (let i = eBullets.length - 1; i >= 0; i--) {
            const b = eBullets[i];
            b.x += b.vx;
            b.y += b.vy;
            b.life--;
            if (b.life <= 0 || Math.abs(b.x) > CFG.ARENA_W/2 + 20 || Math.abs(b.y) > CFG.ARENA_H/2 + 20) {
                eBullets.splice(i, 1);
            }
        }
    }

    function updateEnemies() {
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            const a = angle(e, player);
            e.angle = lerp(e.angle, a, 0.08);
            e.flashTimer = Math.max(0, e.flashTimer - 1);

            if (e.type === 'shooter') {
                // Maintain preferred distance
                const d = dist(e, player);
                if (d > e.prefDist + 40) {
                    e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.06);
                    e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.06);
                } else if (d < e.prefDist - 40) {
                    e.vx = lerp(e.vx, -Math.cos(a) * e.speed, 0.06);
                    e.vy = lerp(e.vy, -Math.sin(a) * e.speed, 0.06);
                } else {
                    // Strafe
                    const sa = a + Math.PI / 2;
                    e.vx = lerp(e.vx, Math.cos(sa) * e.speed * 0.5, 0.04);
                    e.vy = lerp(e.vy, Math.sin(sa) * e.speed * 0.5, 0.04);
                }
                e.shootTimer--;
                if (e.shootTimer <= 0) {
                    spawnEnemyBullet(e.x, e.y, player.x, player.y, 4.5);
                    e.shootTimer = e.shootInterval;
                }
            } else if (e.isBoss) {
                // Boss AI
                const d = dist(e, player);
                e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.04);
                e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.04);
                // Speed up when low HP
                const hpRatio = e.hp / e.maxHp;
                if (hpRatio < 0.5) {
                    e.vx *= 1.01;
                    e.vy *= 1.01;
                }
                e.shootTimer--;
                if (e.shootTimer <= 0) {
                    spawnEnemyBullet(e.x, e.y, player.x, player.y, 5);
                    e.shootTimer = Math.max(30, e.shootInterval - (1 - hpRatio) * 40);
                }
                e.ringTimer--;
                if (e.ringTimer <= 0) {
                    spawnRingBullets(e.x, e.y, 14, 3.5);
                    e.ringTimer = Math.max(100, e.ringInterval - (1 - hpRatio) * 60);
                }
                // Spawn minions
                if (hpRatio < 0.5 && Math.random() < 0.003) {
                    const mini = createEnemy('drone', e.x + rand(-30, 30), e.y + rand(-30, 30));
                    mini.radius = 8; mini.speed = 2.8; mini.hp = 20; mini.maxHp = 20;
                    mini.color = '#ff6644'; mini.score = 8;
                    enemies.push(mini);
                }
            } else if (e.type === 'brute') {
                // Brute: slow then charge when close
                const d = dist(e, player);
                const sp = d < 200 ? e.speed * 1.8 : e.speed;
                e.vx = lerp(e.vx, Math.cos(a) * sp, 0.05);
                e.vy = lerp(e.vy, Math.sin(a) * sp, 0.05);
            } else {
                // Drone, splitter, mini: direct chase
                e.vx = lerp(e.vx, Math.cos(a) * e.speed, 0.06);
                e.vy = lerp(e.vy, Math.sin(a) * e.speed, 0.06);
            }

            e.x += e.vx;
            e.y += e.vy;

            // Clamp to arena
            const hw = CFG.ARENA_W / 2 - e.radius;
            const hh = CFG.ARENA_H / 2 - e.radius;
            e.x = clamp(e.x, -hw, hw);
            e.y = clamp(e.y, -hh, hh);
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.vx *= p.friction;
            p.vy *= p.friction;
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= p.decay;
            if (p.alpha <= 0) particles.splice(i, 1);
        }
        for (let i = dmgNums.length - 1; i >= 0; i--) {
            const d = dmgNums[i];
            d.y += d.vy;
            d.vy *= 0.96;
            d.life--;
            d.alpha = d.life / 50;
            if (d.life <= 0) dmgNums.splice(i, 1);
        }
    }

    function updatePowerUps() {
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pu = powerUps[i];
            pu.life--;
            pu.pulse += 0.08;
            if (pu.life <= 0) { powerUps.splice(i, 1); continue; }
            // Magnetic pull
            const d = dist(pu, player);
            if (d < player.pickupRadius) {
                const a = angle(pu, player);
                const pull = (1 - d / player.pickupRadius) * 6;
                pu.x += Math.cos(a) * pull;
                pu.y += Math.sin(a) * pull;
            }
            if (d < player.radius + pu.radius) {
                pu.type.effect(player);
                spawnExplosion(pu.x, pu.y, pu.type.color, 8);
                powerUps.splice(i, 1);
            }
        }
    }

    function checkCollisions() {
        // Bullets vs enemies
        for (let bi = bullets.length - 1; bi >= 0; bi--) {
            const b = bullets[bi];
            for (let ei = enemies.length - 1; ei >= 0; ei--) {
                const e = enemies[ei];
                if (circleCollide(b, e)) {
                    e.hp -= b.damage;
                    e.flashTimer = 6;
                    // Life steal
                    if (player.lifeSteal > 0) {
                        const heal = b.damage * player.lifeSteal;
                        player.hp = Math.min(player.hp + heal, player.maxHp);
                    }
                    spawnDmgNum(e.x, e.y - e.radius - 5, Math.floor(b.damage).toString(), '#ffdd44');
                    spawnParticle(b.x, b.y, e.color, { speed: rand(2, 4), radius: rand(1, 3), decay: 0.05 });
                    if (b.pierce > 0) {
                        b.pierce--;
                        b.damage *= 0.7;
                    } else {
                        bullets.splice(bi, 1);
                    }
                    // Enemy death
                    if (e.hp <= 0) {
                        killEnemy(ei);
                    }
                    break;
                }
            }
        }

        // Enemy bullets vs player
        if (invTimer <= 0) {
            for (let i = eBullets.length - 1; i >= 0; i--) {
                if (circleCollide(eBullets[i], player)) {
                    damagePlayer(eBullets[i].damage);
                    spawnExplosion(eBullets[i].x, eBullets[i].y, '#ff6600', 6);
                    eBullets.splice(i, 1);
                }
            }
        }

        // Enemies vs player
        if (invTimer <= 0) {
            for (const e of enemies) {
                if (circleCollide(e, player)) {
                    damagePlayer(e.dmg);
                    // Knockback
                    const a = angle(e, player);
                    player.vx += Math.cos(a) * 8;
                    player.vy += Math.sin(a) * 8;
                    break;
                }
            }
        }
    }

    function killEnemy(idx) {
        const e = enemies[idx];
        spawnExplosion(e.x, e.y, e.color, e.isBoss ? 40 : 14);
        screenShake = e.isBoss ? 18 : 6;
        flashAlpha = e.isBoss ? 0.3 : 0;
        flashColor = e.color;

        // Score & combo
        combo++;
        comboTimer = CFG.COMBO_TIMEOUT;
        if (combo > maxCombo) maxCombo = combo;
        const comboMult = 1 + (combo - 1) * 0.1;
        score += Math.floor(e.score * comboMult);
        totalKills++;

        // Splitter
        if (e.splits) {
            for (let s = 0; s < 3; s++) {
                const mini = createEnemy('mini', e.x + rand(-15, 15), e.y + rand(-15, 15));
                enemies.push(mini);
            }
        }

        // Boss cleanup
        if (e.isBoss) {
            bossRef = null;
            document.getElementById('bossBarWrap').classList.add('hidden');
        }

        // Power-up drop
        spawnPowerUp(e.x, e.y);

        enemies.splice(idx, 1);
    }

    function damagePlayer(rawDmg) {
        const dmg = Math.floor(rawDmg * player.armor);
        player.hp -= dmg;
        invTimer = CFG.INVINCE_TIME;
        screenShake = 8;
        flashAlpha = 0.25;
        flashColor = '#ff0000';
        spawnDmgNum(player.x, player.y - player.radius - 10, '-' + dmg, '#ff4444');
        spawnExplosion(player.x, player.y, '#ff2244', 8);
        if (player.hp <= 0) {
            player.hp = 0;
            gameOver();
        }
    }

    function updateCombo() {
        if (comboTimer > 0) {
            comboTimer--;
            if (comboTimer <= 0) combo = 0;
        }
    }

    function updateSpawner() {
        if (!waveActive || spawnQueue.length === 0) return;
        spawnTimer--;
        if (spawnTimer <= 0) {
            const type = spawnQueue.shift();
            const e = spawnEnemyAtEdge(type);
            enemies.push(e);
            if (e.isBoss) bossRef = e;
            spawnTimer = wave % 5 === 0 ? 30 : Math.max(8, 25 - wave);
        }
    }

    function checkWaveComplete() {
        if (!waveActive) return;
        if (spawnQueue.length === 0 && enemies.length === 0) {
            waveActive = false;
            waveCompleteTimer = 60;
        }
    }

    // ==================== DRAW FUNCTIONS ====================
    function toScreen(wx, wy) {
        return {
            x: wx - camera.x + W / 2,
            y: wy - camera.y + H / 2
        };
    }

    function isOnScreen(wx, wy, margin = 60) {
        const s = toScreen(wx, wy);
        return s.x > -margin && s.x < W + margin && s.y > -margin && s.y < H + margin;
    }

    function drawGrid() {
        const gs = CFG.GRID_SIZE;
        const ox = (-camera.x + W / 2) % gs;
        const oy = (-camera.y + H / 2) % gs;
        ctx.strokeStyle = 'rgba(0, 255, 136, 0.035)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = ox; x < W; x += gs) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, H);
        }
        for (let y = oy; y < H; y += gs) {
            ctx.moveTo(0, y);
            ctx.lineTo(W, y);
        }
        ctx.stroke();
    }

    function drawStars() {
        const t = performance.now() * 0.001;
        bgStars.forEach(s => {
            if (!isOnScreen(s.x, s.y, 10)) return;
            const p = toScreen(s.x, s.y);
            const a = s.a + Math.sin(t * s.pulse * 60) * 0.1;
            ctx.fillStyle = `rgba(0, 255, 136, ${a})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    function drawArenaBorder() {
        const tl = toScreen(-CFG.ARENA_W / 2, -CFG.ARENA_H / 2);
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 25;
        ctx.strokeRect(tl.x, tl.y, CFG.ARENA_W, CFG.ARENA_H);
        ctx.shadowBlur = 0;
    }

    function drawPlayer() {
        const s = toScreen(player.x, player.y);
        const a = player.angle;
        const r = player.radius;

        // Skip drawing every other frame when invincible (flash effect)
        if (invTimer > 0 && Math.floor(invTimer / 3) % 2 === 0) return;

        // Glow
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 18;

        // Triangle ship
        ctx.fillStyle = '#00ff88';
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * r * 1.3, s.y + Math.sin(a) * r * 1.3);
        ctx.lineTo(s.x + Math.cos(a + 2.5) * r, s.y + Math.sin(a + 2.5) * r);
        ctx.lineTo(s.x + Math.cos(a - 2.5) * r, s.y + Math.sin(a - 2.5) * r);
        ctx.closePath();
        ctx.fill();

        // Inner detail
        ctx.fillStyle = '#00cc66';
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * r * 0.7, s.y + Math.sin(a) * r * 0.7);
        ctx.lineTo(s.x + Math.cos(a + 2.5) * r * 0.45, s.y + Math.sin(a + 2.5) * r * 0.45);
        ctx.lineTo(s.x + Math.cos(a - 2.5) * r * 0.45, s.y + Math.sin(a - 2.5) * r * 0.45);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
    }

    function drawShape(sx, sy, r, shape, angle) {
        ctx.beginPath();
        if (shape === 'tri') {
            for (let i = 0; i < 3; i++) {
                const a = angle + (Math.PI * 2 / 3) * i - Math.PI / 2;
                ctx.lineTo(sx + Math.cos(a) * r, sy + Math.sin(a) * r);
            }
        } else if (shape === 'hex') {
            for (let i = 0; i < 6; i++) {
                const a = angle + (Math.PI * 2 / 6) * i;
                ctx.lineTo(sx + Math.cos(a) * r, sy + Math.sin(a) * r);
            }
        } else if (shape === 'diamond') {
            ctx.moveTo(sx, sy - r);
            ctx.lineTo(sx + r * 0.65, sy);
            ctx.lineTo(sx, sy + r);
            ctx.lineTo(sx - r * 0.65, sy);
        } else if (shape === 'penta') {
            for (let i = 0; i < 5; i++) {
                const a = angle + (Math.PI * 2 / 5) * i - Math.PI / 2;
                ctx.lineTo(sx + Math.cos(a) * r, sy + Math.sin(a) * r);
            }
        } else if (shape === 'oct') {
            for (let i = 0; i < 8; i++) {
                const a = angle + (Math.PI * 2 / 8) * i;
                ctx.lineTo(sx + Math.cos(a) * r, sy + Math.sin(a) * r);
            }
        }
        ctx.closePath();
    }

    function drawEnemies() {
        enemies.forEach(e => {
            if (!isOnScreen(e.x, e.y, e.radius + 20)) return;
            const s = toScreen(e.x, e.y);
            const color = e.flashTimer > 0 ? '#ffffff' : e.color;

            // Glow
            ctx.shadowColor = color;
            ctx.shadowBlur = e.isBoss ? 25 : 12;

            ctx.fillStyle = color;
            drawShape(s.x, s.y, e.radius, e.shape, e.angle);
            ctx.fill();

            // Boss inner ring
            if (e.isBoss) {
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(s.x, s.y, e.radius * 0.55, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;

            // Health bar (if damaged and not mini)
            if (e.hp < e.maxHp && e.type !== 'mini') {
                const bw = e.radius * 2;
                const bh = 3;
                const bx = s.x - bw / 2;
                const by = s.y - e.radius - 10;
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(bx, by, bw, bh);
                ctx.fillStyle = e.color;
                ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
            }
        });
    }

    function drawBullets() {
        // Player bullets
        bullets.forEach(b => {
            if (!isOnScreen(b.x, b.y, 20)) return;
            // Trail
            for (let i = 0; i < b.trail.length; i++) {
                const t = b.trail[i];
                const ts = toScreen(t.x, t.y);
                const a = (i / b.trail.length) * 0.4;
                ctx.fillStyle = `rgba(0, 255, 136, ${a})`;
                ctx.beginPath();
                ctx.arc(ts.x, ts.y, b.radius * (i / b.trail.length) * 0.7, 0, Math.PI * 2);
                ctx.fill();
            }
            const s = toScreen(b.x, b.y);
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#aaffcc';
            ctx.beginPath();
            ctx.arc(s.x, s.y, Math.max(1, b.radius), 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        // Enemy bullets
        eBullets.forEach(b => {
            if (!isOnScreen(b.x, b.y, 20)) return;
            const s = toScreen(b.x, b.y);
            ctx.shadowColor = '#ff6600';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#ffaa44';
            ctx.beginPath();
            ctx.arc(s.x, s.y, b.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        });
    }

    function drawPowerUps() {
        powerUps.forEach(pu => {
            if (!isOnScreen(pu.x, pu.y, 30)) return;
            const s = toScreen(pu.x, pu.y);
            const pulse = 1 + Math.sin(pu.pulse) * 0.2;
            const r = pu.radius * pulse;
            const blink = pu.life < 120 && Math.floor(pu.life / 6) % 2 === 0;
            if (blink) return;

            ctx.shadowColor = pu.type.color;
            ctx.shadowBlur = 18;

            // Outer glow ring
            ctx.strokeStyle = pu.type.color;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.3;
            ctx.beginPath();
            ctx.arc(s.x, s.y, r + 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Core
            ctx.fillStyle = pu.type.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, r * 0.6, 0, Math.PI * 2);
            ctx.fill();

            // Icon
            ctx.fillStyle = '#06060c';
            ctx.font = 'bold 12px "Share Tech Mono"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(pu.type.icon === 'plus' ? '+' : pu.type.icon === 'bolt' ? 'S' : 'D', s.x, s.y + 1);

            ctx.shadowBlur = 0;
        });
    }

    function drawParticles() {
        particles.forEach(p => {
            if (!isOnScreen(p.x, p.y, 10)) return;
            const s = toScreen(p.x, p.y);
            ctx.globalAlpha = clamp(p.alpha, 0, 1);
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, Math.max(0.5, p.radius * p.alpha), 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Damage numbers
        dmgNums.forEach(d => {
            if (!isOnScreen(d.x, d.y, 40)) return;
            const s = toScreen(d.x, d.y);
            ctx.globalAlpha = clamp(d.alpha, 0, 1);
            ctx.fillStyle = d.color;
            ctx.font = 'bold 14px "Orbitron"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(d.text, s.x, s.y);
        });
        ctx.globalAlpha = 1;
    }

    function drawVignette() {
        const grad = ctx.createRadialGradient(W/2, H/2, W * 0.28, W/2, H/2, W * 0.72);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.55)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
    }

    function drawScreenFlash() {
        if (flashAlpha > 0) {
            ctx.globalAlpha = flashAlpha;
            ctx.fillStyle = flashColor;
            ctx.fillRect(0, 0, W, H);
            ctx.globalAlpha = 1;
            flashAlpha *= 0.88;
            if (flashAlpha < 0.01) flashAlpha = 0;
        }
    }

    function drawAnnounce() {
        if (announce.timer <= 0) return;
        const a = Math.min(1, announce.timer / 30);
        ctx.globalAlpha = a;
        ctx.fillStyle = announce.text.includes('BOSS') ? '#ff2244' : '#00ff88';
        ctx.font = '900 ' + (announce.text.includes('BOSS') ? 52 : 44) + 'px "Orbitron"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = ctx.fillStyle;
        ctx.shadowBlur = 30;
        ctx.fillText(announce.text, W / 2, H / 2 - 20);
        if (announce.sub) {
            ctx.font = '400 14px "Share Tech Mono"';
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            ctx.shadowBlur = 0;
            ctx.fillText(announce.sub, W / 2, H / 2 + 25);
        }
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        announce.timer--;
    }

    function drawCrosshair() {
        const cx = mouse.x;
        const cy = mouse.y;
        ctx.strokeStyle = 'rgba(0, 255, 136, 0.4)';
        ctx.lineWidth = 1;
        const s = 10;
        ctx.beginPath();
        ctx.moveTo(cx - s, cy); ctx.lineTo(cx - 4, cy);
        ctx.moveTo(cx + 4, cy); ctx.lineTo(cx + s, cy);
        ctx.moveTo(cx, cy - s); ctx.lineTo(cx, cy - 4);
        ctx.moveTo(cx, cy + 4); ctx.lineTo(cx, cy + s);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 255, 136, 0.6)';
        ctx.fill();
    }

    // ==================== HUD UPDATE ====================
    function updateHUD() {
        const hpPct = clamp(player.hp / player.maxHp * 100, 0, 100);
        document.getElementById('hpFill').style.width = hpPct + '%';
        document.getElementById('hpText').textContent = Math.ceil(player.hp) + ' / ' + player.maxHp;
        document.getElementById('score').textContent = score.toLocaleString();

        const comboEl = document.getElementById('combo');
        if (combo > 1) {
            comboEl.textContent = 'x' + combo;
            comboEl.classList.remove('hidden');
            // Re-trigger animation
            comboEl.style.animation = 'none';
            comboEl.offsetHeight;
            comboEl.style.animation = '';
        } else {
            comboEl.classList.add('hidden');
        }

        // Boss bar
        if (bossRef && bossRef.hp > 0) {
            document.getElementById('bossBarWrap').classList.remove('hidden');
            document.getElementById('bossHpFill').style.width = clamp(bossRef.hp / bossRef.maxHp * 100, 0, 100) + '%';
        }

        // Upgrade dots
        const dotsEl = document.getElementById('upgradeDots');
        dotsEl.innerHTML = '';
        const levelSum = Object.values(upgradeLevels).reduce((a, b) => a + b, 0);
        for (let i = 0; i < Math.min(levelSum, 15); i++) {
            const dot = document.createElement('div');
            dot.className = 'upgrade-dot';
            dot.style.background = '#00ff88';
            dot.style.boxShadow = '0 0 6px rgba(0,255,136,0.4)';
            dotsEl.appendChild(dot);
        }
    }

    // ==================== UI MANAGEMENT ====================
    function showMenu() {
        state = 'menu';
        document.getElementById('menuScreen').classList.remove('hidden');
        document.getElementById('shopScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('bossBarWrap').classList.add('hidden');
    }

    function showShop() {
        state = 'shop';
        document.getElementById('shopScreen').classList.remove('hidden');
        // Generate 3 random upgrades
        const pool = [...UPGRADE_POOL];
        const picks = [];
        for (let i = 0; i < 3 && pool.length > 0; i++) {
            const idx = randInt(0, pool.length - 1);
            picks.push(pool.splice(idx, 1)[0]);
        }
        const container = document.getElementById('upgradeCards');
        container.innerHTML = '';
        picks.forEach(up => {
            const lvl = upgradeLevels[up.id] || 0;
            const card = document.createElement('div');
            card.className = 'upgrade-card';
            card.style.setProperty('--uc-color', up.color);
            card.innerHTML = `
                <i class="fas ${up.icon}" style="color:${up.color}"></i>
                <div class="uc-name">${up.name}</div>
                <div class="uc-desc">${up.desc}</div>
                <div class="uc-level">${lvl > 0 ? 'LEVEL ' + (lvl + 1) : 'NEW'}</div>
            `;
            card.addEventListener('click', () => {
                up.apply(player);
                upgradeLevels[up.id] = (upgradeLevels[up.id] || 0) + 1;
                document.getElementById('shopScreen').classList.add('hidden');
                state = 'playing';
                startWave();
            });
            container.appendChild(card);
        });
    }

    function gameOver() {
        state = 'gameOver';
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('bossBarWrap').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.remove('hidden');
        document.getElementById('fScore').textContent = score.toLocaleString();
        document.getElementById('fWaves').textContent = wave;
        document.getElementById('fKills').textContent = totalKills;
        document.getElementById('fCombo').textContent = 'x' + maxCombo;
    }

    function startGame() {
        // Reset everything
        initPlayer();
        bullets = [];
        eBullets = [];
        enemies = [];
        particles = [];
        powerUps = [];
        dmgNums = [];
        wave = 0;
        spawnQueue = [];
        waveActive = false;
        score = 0;
        combo = 0;
        comboTimer = 0;
        maxCombo = 0;
        totalKills = 0;
        screenShake = 0;
        flashAlpha = 0;
        invTimer = 0;
        fireTimer = 0;
        bossRef = null;
        announce = { text: '', timer: 0, sub: '' };
        upgradeLevels = {};
        camera.x = player.x;
        camera.y = player.y;
        initStars();

        document.getElementById('menuScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        document.getElementById('shopScreen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('bossBarWrap').classList.add('hidden');

        state = 'playing';
        startWave();
    }

    // ==================== INPUT ====================
    window.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', e => {
        keys[e.key.toLowerCase()] = false;
    });
    window.addEventListener('mousemove', e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    window.addEventListener('mousedown', e => {
        if (e.button === 0) mouse.down = true;
    });
    window.addEventListener('mouseup', e => {
        if (e.button === 0) mouse.down = false;
    });
    // Prevent context menu
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('retryBtn').addEventListener('click', startGame);

    // ==================== MAIN LOOP ====================
    function update() {
        if (state === 'playing') {
            updatePlayer();
            updateBullets();
            updateEnemies();
            updateParticles();
            updatePowerUps();
            updateSpawner();
            checkCollisions();
            updateCombo();
            checkWaveComplete();

            if (!waveActive && waveCompleteTimer > 0) {
                waveCompleteTimer--;
                if (waveCompleteTimer <= 0) {
                    showShop();
                }
            }
        } else if (state === 'menu') {
            // Animate background
            camera.x = Math.sin(performance.now() * 0.0002) * 200;
            camera.y = Math.cos(performance.now() * 0.00015) * 150;
            updateParticles();
            // Ambient particles
            if (Math.random() < 0.1) {
                spawnParticle(
                    rand(-W/2, W/2) + camera.x,
                    rand(-H/2, H/2) + camera.y,
                    '#00ff88', { speed: rand(0.2, 0.8), radius: rand(1, 3), decay: rand(0.005, 0.015), friction: 0.995 }
                );
            }
        }

        // Camera
        if (state === 'playing' || state === 'gameOver') {
            camera.x = lerp(camera.x, player.x, 0.08);
            camera.y = lerp(camera.y, player.y, 0.08);
        }

        // Screen shake decay
        if (screenShake > 0) screenShake *= 0.85;
        if (screenShake < 0.5) screenShake = 0;
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);

        // Background
        ctx.fillStyle = '#06060c';
        ctx.fillRect(0, 0, W, H);

        // Screen shake offset
        ctx.save();
        if (screenShake > 0) {
            ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
        }

        drawGrid();
        drawStars();
        drawArenaBorder();

        if (state === 'playing' || state === 'gameOver' || state === 'shop') {
            drawPowerUps();
            drawBullets();
            drawEnemies();
            drawPlayer();
            drawParticles();
        } else {
            drawParticles();
        }

        ctx.restore();

        drawVignette();
        drawScreenFlash();
        drawAnnounce();

        if (state === 'playing') {
            drawCrosshair();
            updateHUD();
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // ==================== INIT ====================
    initStars();
    showMenu();
    loop();
    </script>
</body>
</html>
